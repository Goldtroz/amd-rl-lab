# SAC Continuous Control Config
# For MuJoCo / custom continuous envs

env:
  name: "Pendulum-v1"
  # or "Hopper-v4", "Walker2d-v4", etc.

agent:
  lr: 0.0003
  gamma: 0.99
  tau: 0.005
  alpha: 0.2
  auto_alpha: true
  hidden_dim: 256
  buffer_size: 1_000_000
  batch_size: 256
  warmup_steps: 1000
  update_every: 1
  updates_per_step: 1
  use_mixed_precision: true

training:
  total_timesteps: 500_000
  eval_freq: 10_000
  save_freq: 50_000
  log_dir: "runs/sac_pendulum"
  checkpoint_dir: "checkpoints/sac_pendulum"

logging:
  tensorboard: true
  wandb: false
