# PPO Atari Training Config
# Tested on RX 7900 XTX with ROCm 6.2

env:
  name: "ALE/Breakout-v5"
  frame_skip: 4
  stack_frames: 4
  clip_reward: true

agent:
  lr: 0.00025
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.1
  entropy_coeff: 0.01
  value_coeff: 0.5
  max_grad_norm: 0.5
  n_epochs: 3
  n_steps: 128
  batch_size: 256
  hidden_dim: 512
  use_mixed_precision: true
  compile_model: false  # breaks on ROCm sometimes

training:
  total_timesteps: 10_000_000
  eval_freq: 50_000
  save_freq: 250_000
  log_dir: "runs/ppo_breakout"
  checkpoint_dir: "checkpoints/ppo_breakout"
  n_envs: 8  # parallel envs

logging:
  tensorboard: true
  wandb: false  # just tensorboard for now
